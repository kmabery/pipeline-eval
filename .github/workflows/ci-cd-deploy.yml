# Canonical main-branch pipeline: CI → GitHub Environment approval (production) → CD.
# PR validation uses workflow CI (.github/workflows/ci.yml) only.
name: CI-CD-Deploy

on:
  push:
    branches: [main]
    # Evidence/report commits under docs/ do not re-run CI → deploy → smoke (use workflow_dispatch to force).
    paths-ignore:
      - "docs/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/reusable-ci.yml

  deploy:
    needs: ci
    uses: ./.github/workflows/reusable-cd-deploy.yml
    secrets: inherit

  deployed-smoke:
    name: Deployed smoke (Playwright)
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      E2E_BASE_URL: ${{ vars.CLOUDFRONT_WEB_URL }}
      E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
      E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
    defaults:
      run:
        working-directory: src/front-end/PipelineEval.Web
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/front-end/PipelineEval.Web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for API /health
        run: |
          api="${{ vars.API_PUBLIC_URL }}"
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$api/health" || true)
            echo "attempt $i -> $code"
            if [ "$code" = "200" ]; then
              exit 0
            fi
            sleep 5
          done
          echo "API $api/health never returned 200"
          exit 1

      - name: Playwright deployed smoke
        run: npx playwright test --project=deployed

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: |
            src/front-end/PipelineEval.Web/playwright-report
            src/front-end/PipelineEval.Web/test-results
          if-no-files-found: ignore
          retention-days: 14
